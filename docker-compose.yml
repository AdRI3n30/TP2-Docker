services:

  db_mysql:
    image: mysql:8.0
    restart: on-failure
    environment:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE
      - MYSQL_USER
      - MYSQL_PASSWORD
    volumes:
      - ./Mysql/sqlfiles:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysql -u$$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE --skip-column-names -e 'SELECT COUNT(*) FROM utilisateurs HAVING COUNT(*) = 4' | grep -q 4"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s



  db_mongo:
    build: ./MongoDB
    restart: on-failure
    environment:
      - MONGO_INITDB_ROOT_USERNAME
      - MONGO_INITDB_ROOT_PASSWORD
      - MONGO_INITDB_DATABASE
    volumes:
      - ./MongoDB/dbfiles:/docker-entrypoint-initdb.d
    healthcheck:
      test: "mongosh --quiet --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --eval 'db.getSiblingDB(\"blog_db\").posts.countDocuments()' | grep -q '5' || exit 1"
      interval: 3s     
      timeout: 2s     
      retries: 5

  api:
    build: ./api
    restart: on-failure
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app  
    command: uvicorn main:app --host 0.0.0.0 --port 8000  
    environment:
      - MYSQL_HOST=db_mysql
      - MYSQL_USER
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE
      - MONGO_INITDB_ROOT_USERNAME
      - MONGO_INITDB_ROOT_PASSWORD
      - MONGO_INITDB_DATABASE
      - MONGO_HOST=db_mongo
    depends_on:
      db_mysql:
        condition: service_healthy
      db_mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/posts'); urllib.request.urlopen('http://localhost:8000/users')"]
      interval: 15s     
      timeout: 10s       
      retries: 5         
      start_period: 45s  


  admin_mysql:
    image: adminer
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      db_mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3    


  admin_mongo:
    image: mongo-express
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME
      - ME_CONFIG_MONGODB_ADMINPASSWORD
      - ME_CONFIG_MONGODB_SERVER=db_mongo
      - ME_CONFIG_MONGODB_PORT
    depends_on:
      db_mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:8081/', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s 